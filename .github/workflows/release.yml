name: Release build

# Triggers on tag push (v*). Builds raw `Image`, `imx8mm-tc8.dtb`, and
# `rootfs.img` (plain ext4, no AVB) and attaches them as release assets.
# Runs on a free GitHub-hosted Ubuntu runner.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the release + upload assets

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out at the tag, with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # so `git describe --tags` works inside build.sh

      - name: Install host prereqs (matches BUILDING.md)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              git build-essential bison flex bc kmod \
              gcc-aarch64-linux-gnu \
              qemu-user-static binfmt-support \
              debootstrap rsync \
              e2fsprogs python3 \
              zstd

      - name: Bootstrap kernel tree
        run: ./bootstrap.sh

      - name: Build emmc target
        run: sudo --preserve-env=PATH ./build.sh --profile=emmc

      - name: Assemble release assets
        run: |
          set -e
          mkdir -p assets
          cp out/emmc/Image             assets/Image
          cp out/emmc/imx8mm-tc8.dtb    assets/imx8mm-tc8.dtb
          cp out/emmc/version.env       assets/version.env
          sudo zstd -19 -T0 -q -f out/emmc/rootfs.img -o assets/rootfs.img.zst
          ( cd assets && sha256sum * > SHA256SUMS )
          ls -lh assets/

      - name: Sanity check kernel size under BOOTM_LEN cap
        run: |
          size=$(stat -c%s out/emmc/Image)
          if [ "$size" -gt 33554432 ]; then
              echo "::error::Image is ${size} bytes — exceeds u-boot 32 MiB BOOTM_LEN cap"
              exit 1
          fi
          echo "Image size OK: $size bytes"

      - name: Create GitHub release with all assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              assets/Image \
              assets/imx8mm-tc8.dtb \
              assets/rootfs.img.zst \
              assets/version.env \
              assets/SHA256SUMS

      - name: Upload artifacts (also kept on the workflow run for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: tc8-firmware-${{ github.ref_name }}
          path: assets/
          retention-days: 30
